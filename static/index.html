<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Reviewer</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<header>Restaurant Reviewer</header>

<div class="container">

    <!-- Promotions -->
    <div id="promotionArea" class="promo-banner" style="display:none;">
        <strong>Promotion:</strong> <span id="promoText"></span>
    </div>

    <!-- Filters -->
    <div class="card">
        <label for="quality">Quality</label>
        <select id="quality">
            <option value="">Any</option>
            <option value="4">4★ and up</option>
            <option value="3">3★ and up</option>
        </select>

        <label for="budget">Budget</label>
        <select id="budget">
            <option value="">Any</option>
            <option value="$">$</option>
            <option value="$$">$$</option>
            <option value="$$$">$$$</option>
        </select>

        <label for="distance">Max Distance (miles)</label>
        <input type="number" id="distance" placeholder="e.g., 5">

        <button onclick="searchRestaurants()">Search</button>
        <button style="margin-top:10px; background:#4caf50;" onclick="explore()">Surprise Me</button>
    </div>

    <!-- Results -->
    <div class="card">
        <h3>Results</h3>
        <div id="results"></div>
    </div>

</div>

<script>
    const API_BASE = "http://127.0.0.1:5000";

    // Load promotion on page load
    window.onload = () => {
        fetch(`${API_BASE}/api/promotions`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("promoText").innerText = data.promotion;
                document.getElementById("promotionArea").style.display = "block";
            })
            .catch(err => console.error("Promotion error:", err));
    };

    // Search restaurants
    function searchRestaurants() {
        const quality = document.getElementById("quality").value;
        const budget = document.getElementById("budget").value;
        const distance = document.getElementById("distance").value;

        fetch(`${API_BASE}/api/restaurants?quality=${quality}&budget=${budget}&distance=${distance}`)
            .then(res => res.json())
            // .then(data => renderResults(data))
            .then(data => {
                console.log("API returned:", data);  // <--- ADD THIS
                renderResults(data);})
            .catch(err => console.error("Search error:", err));
    }

    // Exploration mode
    function explore() {
        fetch(`${API_BASE}/api/explore`)
            .then(res => res.json())
            .then(data => renderResults([data]))
            .catch(err => console.error("Explore error:", err));
    }

    // Render results
    function renderResults(list) {
        const container = document.getElementById("results");
        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = "<p>No restaurants found.</p>";
            return;
        }

        list.forEach(r => {
            const div = document.createElement("div");
            div.className = "restaurant";
            div.innerHTML = `
                <strong>${r.name}</strong><br>
                Rating: ${r.rating}★<br>
                Price: ${r.price}<br>
                Distance: ${r.distance} miles
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
